{% extends 'base.html' %}
{% block title %}{{ _('page.login.title') }} - {{ _('app.name_short') }}{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card shadow-sm border-0">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <i class="bi bi-hdd-stack-fill text-primary" style="font-size:3rem"></i>
          <h3 class="mt-2 fw-bold">{{ _('app.name') }}</h3>
          <p class="text-muted small">{{ _('app.internal') }}</p>
        </div>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ _('common.username') }}</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-control" required autofocus>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">{{ _('common.password') }}</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-1"></i>{{ _('page.login.submit') }}
          </button>
        </form>
        <hr>
        <div class="text-center">
          <span class="text-muted small">{{ _('page.login.no_account') }}</span>
          <a href="{{ url_for('register') }}" class="small">{{ _('page.login.register_now') }}</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
